<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACOC 회사생활</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #8b6f47;
      --primary-dark: #6b5537;
      --accent: #a0826d;
      --success: #6b8e6f;
      
      --bg-main: #f5f1ea;
      --bg-card: #fdfbf7;
      --bg-hover: #f9f5ef;
      --bg-active: #f0ebe2;
      
      --text-primary: #2d2d2d;
      --text-secondary: #5a5a5a;
      --text-tertiary: #8a8a8a;
      
      --border: #e8e1d5;
      --border-hover: #d4caba;
      
      --shadow-sm: 0 1px 3px 0 rgb(139 111 71 / 0.05);
      --shadow-md: 0 4px 8px -1px rgb(139 111 71 / 0.08);
      --shadow-lg: 0 10px 20px -3px rgb(139 111 71 / 0.12);
      
      --radius: 10px;
      --radius-lg: 14px;
      
      --font-display: 'DM Sans', sans-serif;
      --font-body: 'Noto Sans KR', sans-serif;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: var(--font-body);
      background: var(--bg-main);
      color: #2d2d2d;
      line-height: 1.8;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }
    
    /* Header */
    .header {
      background: var(--bg-card);
      border-bottom: 1px solid #e8e1d5;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .header-content {
      max-width: 100%;
      margin: 0;
      padding: 0 32px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    
    .logo-acoc {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 700;
      color: #1a1a1a;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    
    .logo-divider {
      width: 1px;
      height: 12px;
      background: #ccc;
    }
    
    .logo-page {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 400;
      color: #888;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    
    .btn {
      padding: 0.5rem 0.875rem;
      border: 1px solid #d9d0c5;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--font-body);
      background: var(--bg-card);
      color: #5a5a5a;
      white-space: nowrap;
    }
    
    .btn:hover {
      background: #faf8f5;
      border-color: #b8a898;
      color: #2d2d2d;
    }
    
    .btn-primary {
      background: #1a1a1a;
      color: #fff;
      border: 1px solid #1a1a1a;
      font-size: 13px;
    }
    
    .btn-primary:hover {
      background: #333;
      border-color: #333;
    }
    
    /* Navigation */
    .nav {
      background: var(--bg-card);
      border-bottom: 1px solid #e8e1d5;
      position: sticky;
      top: 80px;
      z-index: 90;
      backdrop-filter: blur(10px);
    }
    
    .nav-content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      gap: 0.5rem;
      overflow-x: auto;
      scrollbar-width: none;
      align-items: center;
    }
    
    .nav-content::-webkit-scrollbar {
      display: none;
    }
    
    .nav-tab {
      font-family: var(--font-body);
      padding: 1rem 1.5rem;
      border: none;
      background: none;
      color: #5a5a5a;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      position: relative;
    }
    
    .nav-tab:hover {
      color: #2d2d2d;
      background: #faf8f5;
    }
    
    .nav-tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
      font-weight: 600;
    }
    
    .nav-tab .delete-tab {
      position: absolute;
      top: 0.5rem;
      right: 0.25rem;
      background: var(--bg-active);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 18px;
      height: 18px;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      cursor: pointer;
      color: var(--text-tertiary);
    }
    
    .nav-tab:hover .delete-tab {
      display: flex;
    }
    
    .delete-tab:hover {
      background: #ef4444;
      color: white;
      border-color: #ef4444;
    }
    
    .add-tab-btn {
      padding: 0.75rem 1rem;
      margin-left: 0.5rem;
      font-size: 0.875rem;
      background: var(--primary);
      color: white;
      border: 1px solid var(--primary);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
      white-space: nowrap;
    }
    
    .add-tab-btn:hover {
      background: var(--primary-dark);
    }
    
    /* Container */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 3rem 2rem;
    }
    
    .section {
      display: none;
      animation: fadeIn 0.3s ease;
    }
    
    .section.active {
      display: block;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .page-title {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      letter-spacing: -0.02em;
      color: #2d2d2d;
    }
    
    .page-desc {
      font-size: 1rem;
      color: #5a5a5a;
      margin-bottom: 2.5rem;
      font-weight: 400;
    }
    
    /* Hero Section */
    .hero {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: 3rem 2.5rem;
      margin-bottom: 3rem;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      text-align: center;
    }
    
    .hero-icon {
      font-size: 3rem;
      margin-bottom: 1.5rem;
    }
    
    .hero-title {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--primary);
      letter-spacing: -0.02em;
    }
    
    .hero-title a {
      color: inherit;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    
    .hero-title a:hover {
      opacity: 0.8;
    }
    
    .hero-desc {
      font-size: 1.05rem;
      line-height: 1.9;
      color: #5a5a5a;
      margin-bottom: 1.5rem;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
    }
    
    .hero-slogan {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-style: italic;
      color: var(--accent);
      font-weight: 500;
      letter-spacing: 0.01em;
    }
    
    /* Card */
    .card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: 2rem;
      margin-bottom: 2rem;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      transition: all 0.2s;
      position: relative;
    }
    
    .card.collapsed .card-body {
      display: none;
    }
    
    .card:hover {
      box-shadow: var(--shadow-md);
      border-color: var(--border-hover);
    }
    
    /* Toggle Section */
    .toggle-section {
      margin-bottom: 1.25rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--bg-card);
    }
    
    .toggle-header {
      padding: 1.25rem 1.75rem;
      background: #faf8f5;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 600;
      transition: all 0.2s;
      user-select: none;
      color: #2d2d2d;
    }
    
    .toggle-header:hover {
      background: var(--bg-active);
    }
    
    .toggle-icon {
      transition: transform 0.3s;
      color: var(--text-tertiary);
      font-size: 0.875rem;
    }
    
    .toggle-section.open .toggle-icon {
      transform: rotate(180deg);
    }
    
    .toggle-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    
    .toggle-section.open .toggle-content {
      max-height: 5000px;
    }
    
    .toggle-body {
      padding: 1.75rem;
      background: var(--bg-card);
    }
    
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #e8e1d5;
    }
    
    .card.collapsed .card-header {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }
    
    .card-header-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex: 1;
    }
    
    .card-title {
      font-family: var(--font-display);
      font-size: 1.35rem;
      font-weight: 600;
      color: #2d2d2d;
      display: flex;
      align-items: center;
      gap: 0.625rem;
      letter-spacing: -0.01em;
    }
    
    .card-title.editable[contenteditable="true"] {
      outline: 2px solid var(--primary);
      outline-offset: 4px;
      padding: 0.25rem 0.5rem;
      border-radius: var(--radius);
      background: #fef9f3;
    }
    
    .card-controls {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }
    
    .collapse-btn, .delete-card-btn {
      padding: 0.375rem;
      font-size: 0.875rem;
      background: #faf8f5;
      color: #5a5a5a;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.2s;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .collapse-btn:hover, .delete-card-btn:hover {
      background: var(--bg-active);
      color: #2d2d2d;
    }
    
    .delete-card-btn:hover {
      background: #ef4444;
      color: white;
      border-color: #ef4444;
    }
    
    .card.collapsed .collapse-btn {
      transform: rotate(180deg);
    }
    
    .edit-btn {
      padding: 0.375rem 0.875rem;
      font-size: 0.8rem;
      background: #faf8f5;
      color: #5a5a5a;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }
    
    .edit-btn:hover {
      background: var(--bg-active);
      border-color: var(--border-hover);
      color: #2d2d2d;
    }
    
    .card-body {
      color: #5a5a5a;
      line-height: 1.9;
      min-height: 100px;
    }
    
    .card-body h3 {
      color: #2d2d2d;
      font-size: 1.1rem;
      font-weight: 600;
      margin: 1.75rem 0 1rem 0;
      letter-spacing: -0.01em;
    }
    
    .card-body ul {
      list-style: none;
      padding-left: 0;
    }
    
    .card-body ul li {
      padding: 0.875rem 0;
      padding-left: 1.75rem;
      position: relative;
      line-height: 1.8;
      color: #5a5a5a;
    }
    
    .card-body ul li::before {
      content: '•';
      position: absolute;
      left: 0.5rem;
      color: var(--primary);
      font-weight: bold;
      font-size: 1.1rem;
    }
    
    .card-body ol {
      padding-left: 1.75rem;
      counter-reset: item;
      list-style: none;
    }
    
    .card-body ol li {
      padding: 0.875rem 0;
      padding-left: 0.5rem;
      position: relative;
      line-height: 1.8;
      color: #5a5a5a;
      counter-increment: item;
    }
    
    .card-body ol li::before {
      content: counter(item) ".";
      position: absolute;
      left: -1.5rem;
      color: var(--primary);
      font-weight: 600;
    }
    
    .card-body p {
      margin-bottom: 1rem;
      line-height: 1.85;
      color: #5a5a5a;
    }
    
    .card-body strong {
      color: #2d2d2d;
      font-weight: 600;
    }
    
    .card-body a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
      transition: all 0.2s;
    }
    
    .card-body a:hover {
      text-decoration: underline;
      color: var(--primary-dark);
    }
    
    .highlight {
      background: #fef3e6;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      color: var(--primary-dark);
      font-weight: 600;
    }
    
    .alert-box {
      background: #fef9f3;
      border-left: 3px solid var(--primary);
      padding: 1.25rem 1.5rem;
      border-radius: var(--radius);
      color: #2d2d2d;
      margin-bottom: 1.5rem;
      line-height: 1.8;
    }
    
    .alert-box strong {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--primary);
    }
    
    .editable[contenteditable="true"] {
      outline: 2px solid var(--primary);
      outline-offset: 4px;
      padding: 0.6rem 0.75rem;
      border-radius: var(--radius);
      background: #fef9f3;
    }
    
    /* Formatting Toolbar */
    .format-toolbar {
      display: none;
      gap: 0.5rem;
      padding: 0.75rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 1rem;
      flex-wrap: wrap;
      box-shadow: var(--shadow-sm);
    }
    
    .format-toolbar.active {
      display: flex;
    }
    
    .format-btn {
      padding: 0.5rem 0.75rem;
      background: #faf8f5;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      color: #5a5a5a;
      transition: all 0.2s;
      font-family: var(--font-body);
    }
    
    .format-btn:hover {
      background: var(--bg-active);
      color: #2d2d2d;
    }
    
    .format-btn.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }
    
    .format-divider {
      width: 1px;
      background: var(--border);
      margin: 0 0.25rem;
    }
    
    /* Partner Table */
    .partner-table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
    }
    
    .partner-table th,
    .partner-table td {
      padding: 0.6rem 0.75rem;
      text-align: left;
      border-bottom: 1px solid #e8e1d5;
    }
    
    .partner-table th {
      background: #faf8f5;
      font-weight: 600;
      color: #2d2d2d;
      width: 25%; font-size: 0.875rem;
    }
    
    .partner-table td {
      color: #5a5a5a;
    }
    
    .partner-table tr:last-child th,
    .partner-table tr:last-child td {
      border-bottom: none;
    }
    
    .partner-table tr:hover {
      background: #faf8f5;
    }
    
    .save-controls {
      display: none;
      gap: 0.75rem;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }
    
    .save-controls.active {
      display: flex;
    }
    
    .add-card-btn {
      padding: 0.6rem 0.75rem;
      background: #faf8f5;
      border: 2px dashed var(--border);
      border-radius: var(--radius-lg);
      color: #5a5a5a;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
      font-weight: 500;
      margin-bottom: 2rem;
    }
    
    .add-card-btn:hover {
      background: var(--bg-active);
      border-color: var(--border-hover);
      color: #2d2d2d;
    }
    
    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    
    .modal.active {
      display: flex;
    }
    
    .modal-content {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: 2rem;
      max-width: 500px;
      width: 90%;
      box-shadow: var(--shadow-lg);
    }
    
    .modal-title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      color: #2d2d2d;
    }
    
    .modal-input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-family: var(--font-body);
      margin-bottom: 1.5rem;
      transition: all 0.2s;
    }
    
    .modal-input:focus {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
      border-color: var(--primary);
    }
    
    .modal-buttons {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
    }
    
    /* Notification */
    .notification {
      position: fixed;
      top: 100px;
      right: 2rem;
      background: var(--success);
      color: white;
      padding: 1rem 1.5rem;
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      opacity: 0;
      transform: translateY(-20px);
      transition: all 0.3s;
      z-index: 1000;
      pointer-events: none;
      font-weight: 500;
    }
    
    .notification.show {
      opacity: 1;
      transform: translateY(0);
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      .header-content {
        padding: 0.6rem 0.75rem;
      }
      
      .container {
        padding: 2rem 1rem;
      }
      
      .page-title {
        font-size: 1.5rem;
      }
      
      .nav {
        top: 70px;
      }
      
      .hero {
        padding: 2rem 1.5rem;
      }
      
      .hero-title {
        font-size: 1.5rem;
      }
      
      .card {
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-content">
      <div class="logo">
        <span class="logo-acoc">ACOC</span>
        <div class="logo-divider"></div>
        <span class="logo-page">회사생활</span>
      </div>
      <div style="display: flex; gap: 0.5rem; align-items: center;">
        <button class="btn" onclick="undoChanges()" id="undo-btn" style="display: none;">↶ 되돌리기</button>
        <button class="btn btn-primary" onclick="openTabModal()">+ 카테고리 추가</button>
      </div>
    </div>
  </header>

  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-content" id="navTabs">
      <!-- Tabs will be dynamically generated -->
    </div>
  </nav>

  <!-- Main Content -->
  <main class="container" id="mainContent">
    <!-- Sections will be dynamically generated -->
  </main>

  <!-- Add Tab Modal -->
  <div class="modal" id="tabModal">
    <div class="modal-content">
      <h2 class="modal-title">새 카테고리 추가</h2>
      <input type="text" class="modal-input" id="tabNameInput" placeholder="카테고리 이름 (예: 기본가이드)">
      <input type="text" class="modal-input" id="tabIconInput" placeholder="이모지 아이콘 (예: 📖)">
      <div class="modal-buttons">
        <button class="btn" onclick="closeTabModal()">취소</button>
        <button class="btn btn-primary" onclick="addNewTab()">추가</button>
      </div>
    </div>
  </div>

  <!-- Add Card Modal -->
  <div class="modal" id="cardModal">
    <div class="modal-content">
      <h2 class="modal-title">새 카드 추가</h2>
      <input type="text" class="modal-input" id="cardTitleInput" placeholder="카드 제목 (예: 인재상)">
      <input type="text" class="modal-input" id="cardIconInput" placeholder="이모지 아이콘 (예: 💎)">
      <div class="modal-buttons">
        <button class="btn" onclick="closeCardModal()">취소</button>
        <button class="btn btn-primary" onclick="addNewCard()">추가</button>
      </div>
    </div>
  </div>

  <!-- Notification -->
  <div class="notification" id="notification"></div>

  <script>
    // Storage key
    const STORAGE_KEY = 'acoc_handbook_data';
    
    // Current state
    let currentTab = 'home';
    let currentAddingTab = null;
    
    // Default data structure
    const defaultData = {
      tabs: [
        {
          id: 'home',
          name: 'ACOC',
          icon: '🏠',
          isHome: true,
          cards: [
            {
              id: 'company-info',
              title: '🏢 회사 정보',

    // Initialize
    const HISTORY_KEY = 'acoc_handbook_history';
    const MAX_HISTORY = 10;
    let appData = loadData();
    let history = loadHistory();
    
    function loadData() {
      const saved = localStorage.getItem(STORAGE_KEY);
      const defaultDataCopy = JSON.parse(JSON.stringify(defaultData));
      
      if (saved) {
        const savedData = JSON.parse(saved);
        
        // Merge saved data with latest defaultData
        defaultDataCopy.tabs.forEach((defaultTab, tabIndex) => {
          const savedTab = savedData.tabs.find(t => t.id === defaultTab.id);
          
          if (savedTab) {
            // 기존 탭 유지하되, 새로운 카드 추가
            defaultTab.cards.forEach((defaultCard) => {
              const savedCard = savedTab.cards.find(c => c.id === defaultCard.id);
              if (!savedCard) {
                // 새로운 카드가 defaultData에 있으면 추가
                savedTab.cards.push(defaultCard);
              }
            });
            
            // 저장된 탭의 데이터 사용 (기존 내용 유지)
            defaultDataCopy.tabs[tabIndex] = savedTab;
          }
        });
        
        // 저장된 탭 중 defaultData에 없는 것은 유지
        savedData.tabs.forEach((savedTab) => {
          if (!defaultDataCopy.tabs.find(t => t.id === savedTab.id)) {
            defaultDataCopy.tabs.push(savedTab);
          }
        });
        
        return defaultDataCopy;
      }
      return defaultDataCopy;
    }
    
    function resetToDefault() {

        localStorage.removeItem(STORAGE_KEY);
        localStorage.removeItem(HISTORY_KEY);
        history = [];
        appData = JSON.parse(JSON.stringify(defaultData));
        renderAll();
        showNotification('🔄 초기 상태로 리셋되었습니다');
      }

    function loadHistory() {
      const saved = localStorage.getItem(HISTORY_KEY);
      return saved ? JSON.parse(saved) : [];
    }
    
    function saveToHistory() {
      const currentState = JSON.parse(JSON.stringify(appData));
      history.push(currentState);
      
      if (history.length > MAX_HISTORY) {
        history.shift();
      }
      
      localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
      updateUndoButton();
    }
    
    function undoChanges() {
      if (history.length === 0) {
        showNotification('⚠️ 되돌릴 내역이 없습니다');
        return;
      }
      
      const previousState = history.pop();
      appData = previousState;
      
      localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
      localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
      
      renderAll();
      updateUndoButton();
      showNotification('↶ 이전 상태로 되돌렸습니다');
    }

      const undoBtn = document.getElementById('undo-btn');
      if (undoBtn) {

    function switchTab(tabId) {

      document.querySelectorAll('.section').forEach(section => section.classList.remove('active'));
      
      const activeTab = Array.from(document.querySelectorAll('.nav-tab')).find(tab => {
        return tab.textContent.includes(appData.tabs.find(t => t.id === tabId)?.name || '');
      });
      if (activeTab) activeTab.classList.add('active');
      
      const activeSection = document.getElementById('section-' + tabId);
      if (activeSection) activeSection.classList.add('active');
      
      window.scrollTo({ top: 0, behavior: 'smooth' });

      const content = document.getElementById('content-' + cardId);
      const title = document.getElementById('title-' + cardId);
      const saveControls = document.getElementById('save-' + cardId);
      const toolbar = document.getElementById('toolbar-' + cardId);
      const isEditing = content.getAttribute('contenteditable') === 'true';
      
      if (isEditing) {
        content.setAttribute('contenteditable', 'false');
        title.setAttribute('contenteditable', 'false');
        saveControls.classList.remove('active');
        if (toolbar) toolbar.classList.remove('active');
      } else {
        content.setAttribute('contenteditable', 'true');
        title.setAttribute('contenteditable', 'true');
        saveControls.classList.add('active');
        if (toolbar) toolbar.classList.add('active');
        content.focus();
      }
    }
    
    function formatText(command, value = null) {
      document.execCommand(command, false, value);
    }
    
    function insertCrewTemplate() {
      const selection = window.getSelection();
      const range = selection.getRangeAt(0);
      const container = range.commonAncestorContainer;
      
      // Find the contenteditable parent
      let editableElement = container.nodeType === 3 ? container.parentElement : container;
      while (editableElement && !editableElement.hasAttribute('contenteditable')) {
        editableElement = editableElement.parentElement;
      }
      
      if (editableElement) {
        // Move cursor to end
        const newRange = document.createRange();
        newRange.selectNodeContents(editableElement);
        newRange.collapse(false);
        selection.removeAllRanges();
        selection.addRange(newRange);
      }
      
      const template = `
<div style="padding: 1rem 0; border-top: 1px solid #e8e1d5;">
  <p style="font-weight: 600; margin-bottom: 0.5rem; font-size: 1.05rem;">[이름 - 직책]</p>
  <p style="margin: 0.25rem 0;">☎ 전화번호</p>
  <p style="margin: 0.25rem 0;">✉ 이메일</p>
  <p style="margin: 0.25rem 0;">🚗 차량번호 (선택사항)</p>
</div>
`;
      document.execCommand('insertHTML', false, template);
      showNotification('👤 크루 템플릿이 하단에 추가되었습니다');
    }
    
    function insertPartnerTemplate() {
      const selection = window.getSelection();
      const range = selection.getRangeAt(0);
      const container = range.commonAncestorContainer;
      
      // Find the contenteditable parent
      let editableElement = container.nodeType === 3 ? container.parentElement : container;
      while (editableElement && !editableElement.hasAttribute('contenteditable')) {
        editableElement = editableElement.parentElement;
      }
      
      if (editableElement) {
        // Move cursor to end
        const newRange = document.createRange();
        newRange.selectNodeContents(editableElement);
        newRange.collapse(false);
        selection.removeAllRanges();
        selection.addRange(newRange);
      }
      
      const template = `
<table class="partner-table" style="width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: 0.9rem;">
  <tr>
    <th style="padding: 0.6rem 0.75rem; text-align: left; border-bottom: 1px solid #e8e1d5; background: #faf8f5; font-weight: 600; color: #2d2d2d; width: 25%; font-size: 0.875rem;">거래처명</th>
    <td style="padding: 0.6rem 0.75rem; text-align: left; border-bottom: 1px solid #e8e1d5; color: #5a5a5a;">거래처 이름</td>
  </tr>
  <tr>
    <th style="padding: 0.6rem 0.75rem; text-align: left; background: #faf8f5; font-weight: 600; color: #2d2d2d; font-size: 0.875rem;">연락처 / 주소</th>
    <td style="padding: 0.6rem 0.75rem; text-align: left; color: #5a5a5a;">전화번호 / 주소</td>
  </tr>
</table>
`;
      document.execCommand('insertHTML', false, template);
      showNotification('🏢 거래처 템플릿이 하단에 추가되었습니다');
    }
    
    function saveCard(tabId, cardId) {
      const content = document.getElementById('content-' + cardId);
      const title = document.getElementById('title-' + cardId);
      
      const tab = appData.tabs.find(t => t.id === tabId);
      if (tab) {
        const card = tab.cards.find(c => c.id === cardId);
        if (card) {
          card.content = content.innerHTML;
          card.title = title.textContent;
          saveData();
        }
      }
      
      content.setAttribute('contenteditable', 'false');
      title.setAttribute('contenteditable', 'false');
      document.getElementById('save-' + cardId).classList.remove('active');
      
      showNotification('✅ 저장되었습니다');
    }
    
    function cancelEdit(cardId) {
      const tab = appData.tabs.find(t => t.cards.some(c => c.id === cardId));
      if (tab) {
        const card = tab.cards.find(c => c.id === cardId);
        if (card) {
          document.getElementById('content-' + cardId).innerHTML = card.content;
          document.getElementById('title-' + cardId).textContent = card.title;
        }
      }
      
      document.getElementById('content-' + cardId).setAttribute('contenteditable', 'false');
      document.getElementById('title-' + cardId).setAttribute('contenteditable', 'false');
      document.getElementById('save-' + cardId).classList.remove('active');
    }
    
    function showNotification(message) {
      const notification = document.getElementById('notification');
      notification.textContent = message;
      notification.classList.add('show');
      setTimeout(() => notification.classList.remove('show'), 2000);
    }
    
    // Initialize on load
    renderAll();
  </script>
</body>
</html>
