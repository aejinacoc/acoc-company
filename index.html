<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACOC Company Info</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f7f6f3;--surface:#fff;--surface2:#f2f0ec;--border:#e3e0db;--border2:#ccc9c3;--text:#1a1917;--text2:#6b6860;--text3:#a09d98;--green-bg:#eaf3de;--green-text:#3b6d11;--green-border:#c0dd97;--amber-bg:#faeeda;--amber-text:#854f0b;--red-bg:#fcebeb;--red-text:#a32d2d;--blue-bg:#e6f1fb;--blue-text:#185fa5;--radius:10px;--radius-sm:6px;--radius-xs:4px;}
body{background:var(--bg);color:var(--text);font-family:'Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;font-size:14px;line-height:1.5;padding:1.5rem;min-height:100vh}
.app{max-width:1100px;margin:0 auto}
.brand{font-size:11px;font-weight:700;letter-spacing:0.18em;color:var(--text3);margin-bottom:1.25rem}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:1.25rem}
.tab-btn{padding:9px 18px;font-size:13px;cursor:pointer;border:none;background:none;color:var(--text2);border-bottom:2px solid transparent;font-weight:500;font-family:inherit}
.tab-btn.active{color:var(--text);border-bottom-color:var(--text)}
.btn{padding:7px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all 0.12s;font-family:inherit}
.btn-primary{background:var(--text);color:#fff}.btn-primary:hover{background:#333}
.btn-outline{background:var(--surface);border:1px solid var(--border2);color:var(--text)}.btn-outline:hover{background:var(--surface2)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-ghost{background:none;border:none;color:var(--text2);padding:4px 8px;font-size:12px;cursor:pointer;border-radius:var(--radius-xs);font-family:inherit}
.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.btn-danger{background:var(--red-bg);color:var(--red-text);border:1px solid #f7c1c1}.btn-danger:hover{background:#f7c1c1}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.card-title{font-size:14px;font-weight:700;color:var(--text)}
.form-group{margin-bottom:1rem}
.form-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:5px;display:block}
.form-input{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;font-size:13px;background:var(--surface);color:var(--text);font-family:inherit}
.form-input:focus{outline:none;border-color:var(--border2)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.db-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.db-table{width:100%;border-collapse:collapse;font-size:13px}
.db-table th{text-align:left;padding:9px 12px;color:var(--text3);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;background:var(--surface2);border-bottom:1px solid var(--border)}
.db-table td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.db-table tr:last-child td{border-bottom:none}
.db-table tbody tr:hover td{background:var(--surface2)}
.empty{text-align:center;padding:3rem;color:var(--text3);font-size:13px}
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:1rem;flex-wrap:wrap}
.search-input{border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 12px;font-size:13px;background:var(--surface);color:var(--text);font-family:inherit;min-width:200px}
.search-input:focus{outline:none;border-color:var(--border2)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:var(--green-bg);color:var(--green-text)}
.badge-blue{background:var(--blue-bg);color:var(--blue-text)}
.badge-amber{background:var(--amber-bg);color:var(--amber-text)}
.badge-red{background:var(--red-bg);color:var(--red-text)}
.badge-gray{background:var(--surface2);color:var(--text2)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:var(--surface);border-radius:var(--radius);padding:1.5rem;width:90%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.15)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.modal-title{font-size:16px;font-weight:700}
.hidden{display:none!important}
textarea.form-input{resize:vertical;min-height:80px}
</style>
</head>
<body>
<div class="app">
  <div class="brand">🏢 ACOC COMPANY INFO</div>
  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('list',this)">📋 회사 목록</button>
    <button class="tab-btn" onclick="showTab('add',this)">➕ 회사 등록</button>
  </div>
  <div id="tab-list">
    <div class="toolbar">
      <input type="text" class="search-input" placeholder="🔍 회사명, 브랜드, 담당자 검색..." id="searchInput" oninput="filterList()">
      <button class="btn btn-outline btn-sm" onclick="loadData()">🔄 새로고침</button>
      <span id="countBadge" style="font-size:12px;color:var(--text3)"></span>
    </div>
    <div class="db-wrap">
      <table class="db-table">
        <thead><tr><th>회사명</th><th>브랜드명</th><th>담당자</th><th>연락처</th><th>이메일</th><th>카테고리</th><th>상태</th><th>관리</th></tr></thead>
        <tbody id="companyList"><tr><td colspan="8" class="empty">로딩 중...</td></tr></tbody>
      </table>
    </div>
  </div>
  <div id="tab-add" class="hidden">
    <div class="card">
      <div class="card-header">
        <div class="card-title" id="formTitle">새 회사 등록</div>
        <button class="btn btn-ghost btn-sm" onclick="resetForm()" id="cancelEditBtn" style="display:none">✕ 취소</button>
      </div>
      <input type="hidden" id="editId">
      <div class="form-row">
        <div class="form-group"><label class="form-label">회사명 *</label><input type="text" class="form-input" id="companyName" placeholder="예: (주)에이코크"></div>
        <div class="form-group"><label class="form-label">브랜드명</label><input type="text" class="form-input" id="brandName" placeholder="예: ACOC"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">사업자등록번호</label><input type="text" class="form-input" id="bizNumber" placeholder="000-00-00000"></div>
        <div class="form-group"><label class="form-label">카테고리</label><select class="form-input" id="category"><option value="">선택</option><option value="패션">패션</option><option value="뷰티">뷰티</option><option value="식품">식품</option><option value="생활용품">생활용품</option><option value="전자제품">전자제품</option><option value="기타">기타</option></select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">담당자명</label><input type="text" class="form-input" id="contactName" placeholder="담당자 이름"></div>
        <div class="form-group"><label class="form-label">직책</label><input type="text" class="form-input" id="contactTitle" placeholder="예: 대표, 팀장"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">연락처</label><input type="text" class="form-input" id="phone" placeholder="010-0000-0000"></div>
        <div class="form-group"><label class="form-label">이메일</label><input type="email" class="form-input" id="email" placeholder="contact@example.com"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">주소</label><input type="text" class="form-input" id="address" placeholder="회사 주소"></div>
        <div class="form-group"><label class="form-label">홈페이지</label><input type="text" class="form-input" id="website" placeholder="https://example.com"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">거래 상태</label><select class="form-input" id="status"><option value="활성">활성</option><option value="협의중">협의중</option><option value="휴면">휴면</option><option value="종료">종료</option></select></div>
        <div class="form-group"><label class="form-label">거래 시작일</label><input type="date" class="form-input" id="startDate"></div>
      </div>
      <div class="form-group"><label class="form-label">메모</label><textarea class="form-input" id="memo" placeholder="특이사항, 계약내용 등"></textarea></div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn btn-outline" onclick="resetForm()">초기화</button>
        <button class="btn btn-primary" onclick="saveCompany()">💾 저장</button>
      </div>
    </div>
  </div>
</div>
<div class="modal-overlay hidden" id="detailModal">
  <div class="modal">
    <div class="modal-header"><div class="modal-title" id="modalTitle">회사 상세정보</div><button class="btn btn-ghost" onclick="closeModal()">✕</button></div>
    <div id="modalContent"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:1rem">
      <button class="btn btn-danger btn-sm" id="modalDeleteBtn">🗑 삭제</button>
      <button class="btn btn-outline btn-sm" id="modalEditBtn">✏️ 수정</button>
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">닫기</button>
    </div>
  </div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getDatabase, ref, set, get, remove } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";
const firebaseConfig = {
  apiKey: "AIzaSyAA_RJSwpDX16I3f8mNDlVmgXluoPdykEQ",
  authDomain: "acoc-company.firebaseapp.com",
  databaseURL: "https://acoc-company-default-rtdb.firebaseio.com",
  projectId: "acoc-company",
  storageBucket: "acoc-company.firebasestorage.app",
  messagingSenderId: "519143753513",
  appId: "1:519143753513:web:788c7d854cca19d446d938"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
let allData = [];
let currentEditId = null;
window.showTab = function(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  document.getElementById('tab-list').classList.toggle('hidden', tab !== 'list');
  document.getElementById('tab-add').classList.toggle('hidden', tab !== 'add');
};
window.loadData = async function() {
  const tbody = document.getElementById('companyList');
  tbody.innerHTML = '<tr><td colspan="8" class="empty">로딩 중...</td></tr>';
  try {
    const snap = await get(ref(db, 'companies'));
    allData = [];
    if (snap.exists()) {
      snap.forEach(c => { allData.push({ id: c.key, ...c.val() }); });
      allData.reverse();
    }
    renderList(allData);
  } catch(e) {
    tbody.innerHTML = '<tr><td colspan="8" class="empty">오류: ' + e.message + '</td></tr>';
  }
};
function renderList(data) {
  const tbody = document.getElementById('companyList');
  document.getElementById('countBadge').textContent = '총 ' + data.length + '개';
  if (!data.length) { tbody.innerHTML = '<tr><td colspan="8" class="empty">등록된 회사가 없습니다</td></tr>'; return; }
  const sc = { '활성':'badge-green','협의중':'badge-amber','휴면':'badge-gray','종료':'badge-red' };
  tbody.innerHTML = data.map(c => '<tr onclick="showDetail(''+c.id+'')" style="cursor:pointer"><td><strong>'+(c.companyName||'-')+'</strong></td><td>'+(c.brandName||'-')+'</td><td>'+(c.contactName||'-')+'</td><td>'+(c.phone||'-')+'</td><td>'+(c.email||'-')+'</td><td>'+(c.category||'-')+'</td><td><span class="badge '+(sc[c.status]||'badge-gray')+'">'+(c.status||'-')+'</span></td><td onclick="event.stopPropagation()"><button class="btn btn-ghost btn-sm" onclick="editCompany(''+c.id+'')">✏️</button><button class="btn btn-ghost btn-sm" onclick="deleteCompany(''+c.id+'',''+c.companyName+'')">🗑</button></td></tr>').join('');
}
window.filterList = function() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  renderList(allData.filter(c => (c.companyName||'').toLowerCase().includes(q)||(c.brandName||'').toLowerCase().includes(q)||(c.contactName||'').toLowerCase().includes(q)||(c.email||'').toLowerCase().includes(q)));
};
window.saveCompany = async function() {
  const name = document.getElementById('companyName').value.trim();
  if (!name) { alert('회사명을 입력해주세요'); return; }
  const data = { companyName:name, brandName:document.getElementById('brandName').value.trim(), bizNumber:document.getElementById('bizNumber').value.trim(), category:document.getElementById('category').value, contactName:document.getElementById('contactName').value.trim(), contactTitle:document.getElementById('contactTitle').value.trim(), phone:document.getElementById('phone').value.trim(), email:document.getElementById('email').value.trim(), address:document.getElementById('address').value.trim(), website:document.getElementById('website').value.trim(), status:document.getElementById('status').value, startDate:document.getElementById('startDate').value, memo:document.getElementById('memo').value.trim(), updatedAt:new Date().toISOString() };
  const id = currentEditId || 'company-' + Date.now();
  if (!currentEditId) data.createdAt = new Date().toISOString();
  try {
    await set(ref(db, 'companies/' + id), data);
    alert(currentEditId ? '수정되었습니다' : '등록되었습니다');
    resetForm();
    showTab('list', document.querySelector('.tab-btn'));
    loadData();
  } catch(e) { alert('저장 실패: ' + e.message); }
};
window.editCompany = function(id) {
  const c = allData.find(x => x.id === id);
  if (!c) return;
  currentEditId = id;
  ['companyName','brandName','bizNumber','category','contactName','contactTitle','phone','email','address','website','status','startDate','memo'].forEach(k => { const el=document.getElementById(k); if(el) el.value = c[k]||''; });
  document.getElementById('status').value = c.status||'활성';
  document.getElementById('formTitle').textContent = '회사 정보 수정';
  document.getElementById('cancelEditBtn').style.display = '';
  closeModal();
  const tabs = document.querySelectorAll('.tab-btn');
  tabs[0].classList.remove('active'); tabs[1].classList.add('active');
  document.getElementById('tab-list').classList.add('hidden');
  document.getElementById('tab-add').classList.remove('hidden');
};
window.deleteCompany = async function(id, name) {
  if (!confirm('"' + name + '"을(를) 삭제하시겠습니까?')) return;
  try { await remove(ref(db, 'companies/' + id)); closeModal(); loadData(); } catch(e) { alert('삭제 실패: ' + e.message); }
};
window.resetForm = function() {
  currentEditId = null;
  ['companyName','brandName','bizNumber','contactName','contactTitle','phone','email','address','website','memo','startDate'].forEach(k => { const el=document.getElementById(k); if(el) el.value=''; });
  document.getElementById('category').value = '';
  document.getElementById('status').value = '활성';
  document.getElementById('formTitle').textContent = '새 회사 등록';
  document.getElementById('cancelEditBtn').style.display = 'none';
};
window.showDetail = function(id) {
  const c = allData.find(x => x.id === id);
  if (!c) return;
  const sc = { '활성':'badge-green','협의중':'badge-amber','휴면':'badge-gray','종료':'badge-red' };
  document.getElementById('modalTitle').textContent = c.companyName || '회사 상세';
  document.getElementById('modalContent').innerHTML = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:13px"><div><span style="color:var(--text3);font-size:11px">브랜드명</span><div>'+(c.brandName||'-')+'</div></div><div><span style="color:var(--text3);font-size:11px">사업자번호</span><div>'+(c.bizNumber||'-')+'</div></div><div><span style="color:var(--text3);font-size:11px">카테고리</span><div>'+(c.category||'-')+'</div></div><div><span style="color:var(--text3);font-size:11px">거래 상태</span><div><span class="badge '+(sc[c.status]||'badge-gray')+'">'+(c.status||'-')+'</span></div></div><div><span style="color:var(--text3);font-size:11px">담당자</span><div>'+(c.contactName||'-')+' '+(c.contactTitle?'('+c.contactTitle+')':'')+'</div></div><div><span style="color:var(--text3);font-size:11px">연락처</span><div>'+(c.phone||'-')+'</div></div><div><span style="color:var(--text3);font-size:11px">이메일</span><div>'+(c.email||'-')+'</div></div><div><span style="color:var(--text3);font-size:11px">홈페이지</span><div>'+(c.website?'<a href="'+c.website+'" target="_blank">'+c.website+'</a>':'-')+'</div></div><div><span style="color:var(--text3);font-size:11px">주소</span><div>'+(c.address||'-')+'</div></div><div><span style="color:var(--text3);font-size:11px">거래시작일</span><div>'+(c.startDate||'-')+'</div></div></div>'+(c.memo?'<div style="margin-top:12px"><span style="color:var(--text3);font-size:11px">메모</span><div style="margin-top:4px;padding:10px;background:var(--surface2);border-radius:var(--radius-sm);font-size:13px">'+c.memo+'</div></div>':'');
  document.getElementById('modalDeleteBtn').onclick = () => deleteCompany(id, c.companyName);
  document.getElementById('modalEditBtn').onclick = () => editCompany(id);
  document.getElementById('detailModal').classList.remove('hidden');
};
window.closeModal = function() { document.getElementById('detailModal').classList.add('hidden'); };
document.getElementById('detailModal').addEventListener('click', function(e) { if(e.target===this) closeModal(); });
loadData();
</script>
</body>
</html>
